<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Trial</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0f172a;
            --bg-accent: #1e293b;
            --panel: rgba(15, 23, 42, 0.72);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent-strong: #0ea5e9;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 32%),
                radial-gradient(circle at top right, rgba(14, 165, 233, 0.15), transparent 28%),
                linear-gradient(160deg, var(--bg), var(--bg-accent));
            background-size: 140% 140%;
            animation: bg-drift 16s ease-in-out infinite;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        p {
            color: #e2e8f0;
            text-align: center;
        }

        @keyframes bg-drift {

            0%,
            100% {
                background-position: 0% 0%, 100% 0%, 0% 50%;
            }

            50% {
                background-position: 100% 100%, 0% 100%, 100% 50%;
            }
        }

        .header {
            width: min(100%, 960px);
            padding: 40px 28px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 28px;
            background: var(--panel);
            backdrop-filter: blur(18px);
            box-shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
            overflow: hidden;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 56px;
        }

        .brand {
            font-size: 1rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin: 0;
        }

        .nav-link {
            color: var(--text);
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(15, 23, 42, 0.35);
        }

        .hero {
            max-width: 640px;
        }

        .hero h1 {
            margin: 0 0 16px;
            font-size: clamp(2.5rem, 6vw, 5rem);
            line-height: 0.95;
            letter-spacing: -0.04em;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0 20px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
        }

        .button:hover {
            transform: translateY(-1px);
        }

        .button.primary {
            color: #06111f;
            background: linear-gradient(135deg, #7dd3fc, var(--accent-strong));
        }

        .button.secondary {
            color: var(--text);
            border: 1px solid rgba(148, 163, 184, 0.28);
            background: rgba(15, 23, 42, 0.3);
        }

        @media (max-width: 640px) {
            .header {
                padding: 24px 18px;
                border-radius: 22px;
            }

            .nav {
                flex-direction: column;
                align-items: flex-start;
                margin-bottom: 42px;
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <nav class="nav" aria-label="Primary">
            <p class="brand">Github Trial</p>
            <a class="nav-link" href="#">Homepage</a>
        </nav>

        <section class="hero">
            <h1>Welcome to Github Trial</h1>
            <p>BCA A.I and DL Section-A</p>
            <div class="actions">
                <a class="button primary" href="#">Get Started</a>
                <a class="button secondary" href="#">Learn More</a>
            </div>
        </section>
    </header>
</body>

</html>
